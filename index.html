<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Support | Bro Arif</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #e0e7ff, #f3e8ff);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 25px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
        }

        .btn-trakteer {
            background: #be1e2d;
            color: white;
            font-weight: bold;
        }

        .btn-trakteer:hover {
            background: #ff4757;
        }

        .input-glass {
            background: rgba(255,255,255,0.8);
        }
    </style>
</head>

<body>

<div class="container py-5" style="max-width: 500px;">

    <!-- Profile -->
    <div class="text-center mb-4">
        <!-- <img src="https://ui-avatars.com/api/?name=Bro+Arif" class="profile-img mb-3"> -->
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRT_cn-Q9nuKANCaVOGLXZZ3QjBOTS11lmhEA&s" class="profile-img mb-3">
        <h4 class="fw-bold">Bro Arif</h4>
        <small class="text-muted">Digital Creator & Developer</small>
    </div>

    <!-- Trakteer -->
    <a href="https://trakteer.id/itsmebroarif/tip?open=true" target="_blank" class="btn btn-trakteer w-100 mb-4 py-3">
        <img src="https://png.pngtree.com/png-clipart/20220705/ourmid/pngtree-indosian-money-png-image_5684456.png" width="20"> Dukung Saya di Trakteer
    </a>

    <!-- Form -->
    <div class="glass-card shadow">

        <h5 class="text-center mb-3">
            <i class="fa-brands fa-whatsapp text-success"></i> Chat via WhatsApp
        </h5>

        <form id="waForm">

            <div class="mb-3">
                <label class="form-label">Nama</label>
                <input type="text" id="waName" class="form-control input-glass" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Instagram</label>
                <input type="text" id="waIg" class="form-control input-glass" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Pesan</label>
                <textarea id="waMessage" class="form-control input-glass" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                Kirim Pesan <i class="fa-solid fa-paper-plane"></i>
            </button>

        </form>
    </div>

    <footer class="text-center mt-4 text-muted">
        <small>&copy; 2026 Bro Arif</small>
    </footer>

</div>

<script>
document.getElementById('waForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('waName').value.trim();
    let ig = document.getElementById('waIg').value.trim();
    const message = document.getElementById('waMessage').value.trim();

    if (!ig.startsWith('@')) ig = '@' + ig;

    const text = `Halo Bro Arif,

Perkenalkan saya *${name}*
(IG: ${ig})

Pesan:
${message}`;

    const url = `https://wa.me/6285817048266?text=${encodeURIComponent(text)}`;

    Swal.fire({
        title: 'Kirim ke WhatsApp?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Kirim',
        cancelButtonText: 'Batal'
    }).then((result) => {
        if (result.isConfirmed) {
            window.open(url, '_blank');
        }
    });
});
</script>

</body>
</html>
